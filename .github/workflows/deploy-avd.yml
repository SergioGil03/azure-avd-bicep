# =============================================================
# deploy-avd.yml
# Pipeline CI/CD para Azure Virtual Desktop
# =============================================================

name: Deploy AVD Infrastructure

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'bicep/**'
      - '.github/workflows/deploy-avd.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'bicep/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      what_if_only:
        description: 'Solo what-if, sin desplegar'
        required: false
        default: false
        type: boolean

concurrency:
  group: avd-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AZURE_LOCATION: westeurope
  BICEP_MAIN: bicep/main.bicep

jobs:
  lint-and-validate:
    name: Lint y Validar Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Bicep CLI
        run: |
          curl -Lo /tmp/bicep-cli https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x /tmp/bicep-cli
          sudo mv /tmp/bicep-cli /usr/local/bin/bicep
          bicep --version

      - name: Bicep lint
        run: bicep lint ${{ env.BICEP_MAIN }}

      - name: Bicep build
        run: bicep build ${{ env.BICEP_MAIN }} --outdir /tmp/bicep-compiled

      - name: Guardar ARM template compilado
        uses: actions/upload-artifact@v4
        with:
          name: arm-template-compilado
          path: /tmp/bicep-compiled/
          retention-days: 30

  what-if:
    name: What-If DEV
    runs-on: ubuntu-latest
    needs: lint-and-validate
    environment: dev
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ejecutar What-If
        id: whatif
        run: |
          OUTPUT=$(az deployment sub what-if \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters vmAdminUsername="${{ secrets.AVD_VM_ADMIN_USERNAME }}" \
            --parameters vmAdminPassword="${{ secrets.AVD_VM_ADMIN_PASSWORD }}" \
            --no-pretty-print 2>&1 || true)
          echo "whatif_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comentar resultado en PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## 🔍 AVD What-If — DEV\n\`\`\`\n${{ steps.whatif.outputs.whatif_output }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    needs: lint-and-validate
    environment: dev
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev' && inputs.what_if_only == false)
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      hostPoolName: ${{ steps.deploy.outputs.hostPoolName }}
      workspaceName: ${{ steps.deploy.outputs.workspaceName }}
      sessionHostCount: ${{ steps.deploy.outputs.sessionHostCount }}
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Desplegar AVD en DEV
        id: deploy
        run: |
          RESULT=$(az deployment sub create \
            --name "avd-dev-$(date +%Y%m%d%H%M%S)" \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters vmAdminUsername="${{ secrets.AVD_VM_ADMIN_USERNAME }}" \
            --parameters vmAdminPassword="${{ secrets.AVD_VM_ADMIN_PASSWORD }}" \
            --output json)
          echo "resourceGroupName=$(echo $RESULT | jq -r '.properties.outputs.resourceGroupName.value')" >> $GITHUB_OUTPUT
          echo "hostPoolName=$(echo $RESULT | jq -r '.properties.outputs.hostPoolName.value')" >> $GITHUB_OUTPUT
          echo "workspaceName=$(echo $RESULT | jq -r '.properties.outputs.workspaceName.value')" >> $GITHUB_OUTPUT
          echo "sessionHostCount=1" >> $GITHUB_OUTPUT

      - name: Registrar VMs al Host Pool
        run: |
          RESOURCE_GROUP="${{ steps.deploy.outputs.resourceGroupName }}"
          HOSTPOOL_NAME="${{ steps.deploy.outputs.hostPoolName }}"
          SESSION_HOST_COUNT="${{ steps.deploy.outputs.sessionHostCount }}"

          TOKEN=$(az desktopvirtualization hostpool update \
            --name "$HOSTPOOL_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --registration-info expiration-time="$(date -u -d '+2 hours' '+%Y-%m-%dT%H:%M:%SZ')" registration-token-operation="Update" \
            --query "registrationInfo.token" \
            --output tsv)

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Token vacío, abortando"
            exit 1
          fi
          echo "Token generado ✓ (longitud: ${#TOKEN})"

          for i in $(seq 1 $SESSION_HOST_COUNT); do
            VM_NAME="vm-avddev-$(printf '%02d' $i)"
            echo "Registrando $VM_NAME..."

            az vm extension delete \
              --resource-group "$RESOURCE_GROUP" \
              --vm-name "$VM_NAME" \
              --name "DSC" 2>/dev/null || true

            cat > /tmp/dsc-settings.json << ENDJSON
          {
            "modulesUrl": "https://wvdportalstorageblob.blob.core.windows.net/galleryartifacts/Configuration.zip",
            "configurationFunction": "Configuration.ps1\\AddSessionHost",
            "properties": {
              "HostPoolName": "$HOSTPOOL_NAME"
            }
          }
          ENDJSON

            cat > /tmp/dsc-protected.json << ENDJSON
          {
            "Items": {
              "RegistrationInfoToken": "$TOKEN"
            }
          }
          ENDJSON

            az vm extension set \
              --resource-group "$RESOURCE_GROUP" \
              --vm-name "$VM_NAME" \
              --name "DSC" \
              --publisher "Microsoft.Powershell" \
              --version "2.73" \
              --settings @/tmp/dsc-settings.json \
              --protected-settings @/tmp/dsc-protected.json

            echo "$VM_NAME registrada ✓"
          done

      - name: Summary del despliegue
        run: |
          echo "## DEV Desplegado correctamente" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | ${{ steps.deploy.outputs.resourceGroupName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Host Pool | ${{ steps.deploy.outputs.hostPoolName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | ${{ steps.deploy.outputs.workspaceName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Suscripción | ${{ secrets.AZURE_SUBSCRIPTION_ID }} |" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: lint-and-validate
    environment: prod
    if: |
      startsWith(github.ref, 'refs/heads/release/') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && inputs.what_if_only == false)
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If antes de desplegar en PROD
        run: |
          az deployment sub what-if \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters bicep/parameters/prod.bicepparam \
            --parameters vmAdminUsername="${{ secrets.AVD_VM_ADMIN_USERNAME }}" \
            --parameters vmAdminPassword="${{ secrets.AVD_VM_ADMIN_PASSWORD }}"

      - name: Desplegar AVD en PROD
        id: deploy
        run: |
          RESULT=$(az deployment sub create \
            --name "avd-prod-$(date +%Y%m%d%H%M%S)" \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters bicep/parameters/prod.bicepparam \
            --parameters vmAdminUsername="${{ secrets.AVD_VM_ADMIN_USERNAME }}" \
            --parameters vmAdminPassword="${{ secrets.AVD_VM_ADMIN_PASSWORD }}" \
            --output json)
          echo "resourceGroupName=$(echo $RESULT | jq -r '.properties.outputs.resourceGroupName.value')" >> $GITHUB_OUTPUT
          echo "hostPoolName=$(echo $RESULT | jq -r '.properties.outputs.hostPoolName.value')" >> $GITHUB_OUTPUT
          echo "sessionHostCount=3" >> $GITHUB_OUTPUT

      - name: Registrar VMs al Host Pool
        run: |
          RESOURCE_GROUP="${{ steps.deploy.outputs.resourceGroupName }}"
          HOSTPOOL_NAME="${{ steps.deploy.outputs.hostPoolName }}"
          SESSION_HOST_COUNT="${{ steps.deploy.outputs.sessionHostCount }}"

          TOKEN=$(az desktopvirtualization hostpool update \
            --name "$HOSTPOOL_N